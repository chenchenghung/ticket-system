apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticket-system-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: ticket.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ticket-system-service
                port:
                  number: 80